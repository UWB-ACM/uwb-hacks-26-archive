name: Deploy to GitHub Pages

on:
    push:
        branches:
            - main
    workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
    contents: read
    pages: write
    id-token: write

# Only one Pages deployment at a time; don't cancel an in-progress one.
concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10
            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "pnpm"
            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build static site
              env:
                  # Served from https://<user>.github.io/<repo>/, so the app
                  # needs the repo name as its base path.
                  PAGES_BASE_PATH: "/${{ github.event.repository.name }}"
                  NODE_OPTIONS: "--max_old_space_size=4096"
              run: pnpm run build

            - name: Disable Jekyll processing
              run: touch out/.nojekyll

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: out

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
